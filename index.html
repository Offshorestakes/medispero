<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>Medi Spero | Premium CBD Products | Lab-Tested Hemp Wellness</title>
    <meta name="description" content="Shop Medi Spero's premium CBD products: oils, gummies, topicals, and more. Third-party lab tested, organic hemp, made in USA. Free shipping on orders over $75." />
    <meta name="keywords" content="CBD oil, CBD gummies, CBD topicals, hemp products, CBD wellness, organic CBD, full spectrum CBD, broad spectrum CBD, CBD for sleep, CBD for anxiety, CBD for pain, CBD capsules, pet CBD" />
    <meta name="author" content="Medi Spero" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://medispero.com/" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://medispero.com/" />
    <meta property="og:title" content="Medi Spero | Premium CBD Products | Lab-Tested Hemp Wellness" />
    <meta property="og:description" content="Discover premium, lab-tested CBD products from Medi Spero. Organic hemp, made in USA. Shop CBD oils, gummies, topicals & more. Free shipping over $75." />
    <meta property="og:image" content="https://medispero.com/og-image.jpg" />
    <meta property="og:site_name" content="Medi Spero" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://medispero.com/" />
    <meta name="twitter:title" content="Medi Spero | Premium CBD Products" />
    <meta name="twitter:description" content="Shop premium, lab-tested CBD products. Organic hemp, made in USA. Free shipping over $75." />
    <meta name="twitter:image" content="https://medispero.com/og-image.jpg" />
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Medi Spero",
      "url": "https://medispero.com",
      "logo": "https://medispero.com/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-334-746-9312",
        "contactType": "customer service",
        "email": "info@medispero.com"
      },
      "sameAs": [
        "https://facebook.com/medispero",
        "https://instagram.com/medispero",
        "https://twitter.com/medispero"
      ]
    }
    </script>
    
    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Medi Spero",
      "url": "https://medispero.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://medispero.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Structured Data - Store -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Medi Spero CBD Store",
      "url": "https://medispero.com",
      "telephone": "+1-334-746-9312",
      "email": "info@medispero.com",
      "priceRange": "$$",
      "paymentAccepted": "Credit Card, Debit Card, PayPal",
      "currenciesAccepted": "USD",
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      }
    }
    </script>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
